<!DOCTYPE html>
<html>
<head>
  <title>View All Microphones</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      margin: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      border: 1px solid #333;
      padding: 10px;
      text-align: center;
      background: #222;
      border-radius: 8px;
    }
    img {
      max-width: 100%;
      height: 150px;
      object-fit: contain;
      background: #000;
      border-radius: 4px;
    }
    .filename {
      margin-top: 10px;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Microphone Images</h1>
  <div class="grid" id="image-grid"></div>

  <script>
    // List of 54 image filenames
    const images = [
      "20250419084444.jpg", "20250419084446.jpg", "20250419084448.jpg", "20250419084450.jpg",
      "20250419084452.jpg", "20250419084454.jpg", "20250419084456.jpg", "20250419084458.jpg",
      "20250419084500.jpg", "20250419084501.jpg", "20250419084503.jpg", "20250419084504.jpg",
      "20250419084506.jpg", "20250419084508.jpg", "20250419084510.jpg", "20250419084511.jpg",
      "20250419084513.jpg", "20250419084515.jpg", "20250419084518.jpg", "20250419084520.jpg",
      "20250419084522.jpg", "20250419084523.jpg", "20250419084525.jpg", "20250419084527.jpg",
      "20250419084529.jpg", "20250419084531.jpg", "20250419084533.jpg", "20250419084535.jpg",
      "20250419084536.jpg", "20250419084538.jpg", "20250419084542.jpg", "20250419084544.jpg",
      "20250419084546.jpg", "20250419084550.jpg", "20250419084552.jpg", "20250419084554.jpg",
      "20250419084556.jpg", "20250419084558.jpg", "20250419084600.jpg", "20250419084602.jpg",
      "20250419084604.jpg", "20250419084606.jpg", "20250419084608.jpg", "20250419084610.jpg",
      "20250419084612.jpg", "20250419084614.jpg", "20250419084616.jpg", "20250419084618.jpg",
      "20250419084620.jpg", "20250419084627.jpg", "20250419084630.jpg", "20250419084631.jpg",
      "20250419084633.jpg", "20250419084625.jpg"
    ];

    const grid = document.getElementById('image-grid');
    images.forEach(imgName => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="microphones/${imgName}" alt="${imgName}">
        <div class="filename">${imgName}</div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
