<!DOCTYPE html>
<html>
<head>
  <title>Microphone Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      padding: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }
    img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      background-color: white;
    }
    .filename {
      margin-top: 10px;
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>
<body>
