<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <!-- Metallic Shading Gradients -->
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </linearGradient>

    <linearGradient id="metalLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#666666" />
      <stop offset="30%" stop-color="#444444" />
      <stop offset="70%" stop-color="#222222" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>

    <!-- Yellow Accent Gradient -->
    <linearGradient id="brandYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>

    <!-- Display Glow -->
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#006655" stop-opacity="0.9" />
    </linearGradient>
    
    <linearGradient id="screenGlow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#004488" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" rx="16" />

  <!-- ==================== ANTENNAS ==================== -->
  <g transform="translate(0, 0)">
    <!-- Left Antenna -->
    <path d="M 220 280 L 120 70 L 132 65 L 232 275 Z" fill="url(#metalDark)" />
    <circle cx="126" cy="67" r="8" fill="#111" />
    <circle cx="126" cy="67" r="4" fill="url(#brandYellow)" />
    <!-- Right Antenna -->
    <path d="M 580 280 L 680 70 L 668 65 L 568 275 Z" fill="url(#metalDark)" />
    <circle cx="674" cy="67" r="8" fill="#111" />
    <circle cx="674" cy="67" r="4" fill="url(#brandYellow)" />
  </g>

  <!-- ==================== RECEIVER CHASSIS ==================== -->
  <g id="receiver" transform="translate(100, 220)">
    <!-- Main Chassis Box -->
    <rect x="0" y="30" width="600" height="130" rx="8" fill="url(#metalLight)" stroke="#ffcc00" stroke-width="1.5" stroke-opacity="0.3" />
    <rect x="5" y="35" width="590" height="120" rx="6" fill="#121212" />
    
    <!-- Rack Ears -->
    <rect x="-15" y="45" width="15" height="100" rx="3" fill="url(#metalDark)" />
    <circle cx="-7.5" cy="60" r="4" fill="#000" />
    <circle cx="-7.5" cy="130" r="4" fill="#000" />

    <rect x="600" y="45" width="15" height="100" rx="3" fill="url(#metalDark)" />
    <circle cx="607.5" cy="60" r="4" fill="#000" />
    <circle cx="607.5" cy="130" r="4" fill="#000" />

    <!-- Front Panel Border Line -->
    <line x1="10" y1="38" x2="590" y2="38" stroke="#2a2a2a" stroke-width="1.5" />

    <!-- Logo on Receiver -->
    <text x="300" y="62" fill="url(#brandYellow)" font-family="'Outfit', sans-serif" font-weight="900" font-size="20" letter-spacing="4" text-anchor="middle">DAUYS</text>
    <text x="300" y="73" fill="#666" font-family="sans-serif" font-weight="bold" font-size="8" letter-spacing="1" text-anchor="middle">DIGITAL WIRELESS SYSTEM</text>

    <!-- LEFT LCD DISPLAY -->
    <g transform="translate(60, 80)">
      <rect x="0" y="0" width="180" height="60" rx="6" fill="#030b0a" stroke="#222" stroke-width="2" />
      <rect x="5" y="5" width="170" height="50" rx="4" fill="url(#screenGlow)" opacity="0.15" />
      
      <!-- Display Details (Cyan Glow) -->
      <rect x="10" y="10" width="40" height="40" rx="2" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.4" />
      <!-- RF/AF level bars -->
      <line x1="16" y1="42" x2="16" y2="18" stroke="#00ffcc" stroke-width="3" />
      <line x1="22" y1="42" x2="22" y2="25" stroke="#00ffcc" stroke-width="3" />
      <line x1="28" y1="42" x2="28" y2="14" stroke="#00ffcc" stroke-width="3" />
      <line x1="34" y1="42" x2="34" y2="30" stroke="#00ffcc" stroke-width="3" />
      <text x="25" y="49" fill="#00ffcc" font-family="monospace" font-size="6" text-anchor="middle">RF  AF</text>
      
      <!-- Frequencies and Channel info -->
      <text x="60" y="24" fill="#00ffcc" font-family="monospace" font-weight="bold" font-size="14">642.500</text>
      <text x="132" y="22" fill="#00ffcc" font-family="monospace" font-size="8">MHz</text>
      
      <text x="60" y="38" fill="#00ffcc" font-family="monospace" font-size="9" opacity="0.8">CH.A  03</text>
      <text x="60" y="48" fill="#00ffcc" font-family="monospace" font-size="8" opacity="0.6">BATT [||||]</text>
    </g>

    <!-- RIGHT LCD DISPLAY -->
    <g transform="translate(360, 80)">
      <rect x="0" y="0" width="180" height="60" rx="6" fill="#030b0c" stroke="#222" stroke-width="2" />
      <rect x="5" y="5" width="170" height="50" rx="4" fill="url(#screenGlow2)" opacity="0.15" />
      
      <!-- Display Details (Blue Glow) -->
      <rect x="10" y="10" width="40" height="40" rx="2" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.4" />
      <!-- RF/AF level bars -->
      <line x1="16" y1="42" x2="16" y2="20" stroke="#00ccff" stroke-width="3" />
      <line x1="22" y1="42" x2="22" y2="15" stroke="#00ccff" stroke-width="3" />
      <line x1="28" y1="42" x2="28" y2="28" stroke="#00ccff" stroke-width="3" />
      <line x1="34" y1="42" x2="34" y2="18" stroke="#00ccff" stroke-width="3" />
      <text x="25" y="49" fill="#00ccff" font-family="monospace" font-size="6" text-anchor="middle">RF  AF</text>
      
      <!-- Frequencies and Channel info -->
      <text x="60" y="24" fill="#00ccff" font-family="monospace" font-weight="bold" font-size="14">648.750</text>
      <text x="132" y="22" fill="#00ccff" font-family="monospace" font-size="8">MHz</text>
      
      <text x="60" y="38" fill="#00ccff" font-family="monospace" font-size="9" opacity="0.8">CH.B  12</text>
      <text x="60" y="48" fill="#00ccff" font-family="monospace" font-size="8" opacity="0.6">BATT [||||]</text>
    </g>

    <!-- Controls (Knobs & Buttons) -->
    <!-- Left Controls -->
    <circle cx="35" cy="110" r="10" fill="url(#metalDark)" stroke="#111" stroke-width="1" />
    <line x1="35" y1="110" x2="31" y2="102" stroke="url(#brandYellow)" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="260" cy="100" r="6" fill="#222" />
    <circle cx="260" cy="118" r="6" fill="#222" />

    <!-- Right Controls -->
    <circle cx="565" cy="110" r="10" fill="url(#metalDark)" stroke="#111" stroke-width="1" />
    <line x1="565" y1="110" x2="561" y2="102" stroke="url(#brandYellow)" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="340" cy="100" r="6" fill="#222" />
    <circle cx="340" cy="118" r="6" fill="#222" />
    
    <!-- Central Power Button -->
    <circle cx="300" cy="115" r="14" fill="#151515" stroke="#333" stroke-width="2" />
    <circle cx="300" cy="115" r="10" fill="#0f0f0f" />
    <path d="M 300 109 L 300 115 M 296 111 A 6 6 0 1 0 304 111" fill="none" stroke="url(#brandYellow)" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- ==================== BELTPACK TRANSMITTER & ACCESSORIES ==================== -->
  <!-- Beltpack Transmitter (Lying Angled Left) -->
  <g transform="translate(180, 360) rotate(-6)">
    <!-- Shadow -->
    <rect x="-5" y="-5" width="100" height="130" rx="12" fill="#000" opacity="0.5" filter="blur(6px)" />
    
    <!-- Main body -->
    <rect x="0" y="0" width="90" height="120" rx="10" fill="url(#metalLight)" stroke="#ffcc00" stroke-width="1" stroke-opacity="0.3" />
    <rect x="4" y="4" width="82" height="112" rx="8" fill="#1a1a1a" />
    
    <!-- Antenna -->
    <path d="M 45 0 L 45 -80" stroke="#111" stroke-width="4" stroke-linecap="round" />
    <circle cx="45" cy="-80" r="4" fill="url(#brandYellow)" />

    <!-- Connection socket and switch at the top -->
    <rect x="15" y="-8" width="16" height="8" fill="url(#metalDark)" rx="1" />
    <circle cx="23" cy="-4" r="3" fill="#111" />
    <circle cx="70" cy="-6" r="4" fill="#ffaa00" /> <!-- Mute indicator -->

    <!-- Brand Logo on Transmitter -->
    <text x="45" y="25" fill="url(#brandYellow)" font-family="'Outfit', sans-serif" font-weight="900" font-size="10" letter-spacing="1" text-anchor="middle">DAUYS</text>

    <!-- LCD Display -->
    <rect x="15" y="38" width="60" height="30" rx="4" fill="#050a09" stroke="#333" stroke-width="1" />
    <rect x="18" y="41" width="54" height="24" rx="2" fill="url(#screenGlow)" opacity="0.2" />
    <text x="45" y="52" fill="#00ffcc" font-family="monospace" font-weight="bold" font-size="9" text-anchor="middle">642.500</text>
    <text x="45" y="62" fill="#00ffcc" font-family="monospace" font-size="6" opacity="0.7" text-anchor="middle">CH.03  [|||]</text>
    
    <!-- Pocket Clip detail -->
    <path d="M 12 10 L 12 110 A 6 6 0 0 0 24 110 L 24 20" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Lavalier Lapel Microphone and Wire (Flowing Right) -->
  <g transform="translate(320, 390)">
    <!-- Cable Shadow -->
    <path d="M 0 -15 C 60 -10, 100 20, 160 5" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" opacity="0.4" filter="blur(3px)" />
    <!-- Cable -->
    <path d="M 0 -15 C 60 -10, 100 20, 160 5" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round" />
    
    <!-- Connector (plugs to beltpack) -->
    <rect x="-8" y="-18" width="8" height="14" rx="2" fill="url(#metalDark)" />
    <path d="M -4 -4 L -4 10" stroke="#111" stroke-width="2.5" />

    <!-- Lapel Mic Capsule -->
    <g transform="translate(160, 5)">
      <!-- Clip -->
      <path d="M -8 -4 L 8 -4 L 6 8 L -6 8 Z" fill="#111" stroke="#333" stroke-width="1" />
      <!-- Capsule Body -->
      <rect x="-4" y="-14" width="8" height="15" rx="3" fill="url(#metalDark)" />
      <rect x="-4.5" y="-14" width="9" height="4" fill="#000" rx="1" />
      <!-- Windscreen Grill pattern -->
      <rect x="-4" y="-14" width="8" height="4" fill="url(#brandYellow)" opacity="0.2" />
    </g>
  </g>

  <!-- Headset Microphone (Lying in Background) -->
  <g transform="translate(480, 310) rotate(15)">
    <!-- Shadow -->
    <path d="M 0 0 C 40 -40, 120 -40, 160 0 C 180 20, 180 80, 140 100" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round" opacity="0.3" filter="blur(5px)" />
    
    <!-- Neckband / Headframe Wire -->
    <path d="M 0 0 C 40 -40, 120 -40, 160 0 C 180 20, 180 80, 140 100" fill="none" stroke="url(#metalLight)" stroke-width="3.5" stroke-linecap="round" />
    <rect x="-4" y="-4" width="8" height="12" rx="3" fill="#111" />
    <rect x="136" y="96" width="8" height="12" rx="3" fill="#111" />
    
    <!-- Microphone Boom Arm -->
    <path d="M 140 100 C 120 120, 70 140, 40 130" fill="none" stroke="#111" stroke-width="2" />
    
    <!-- Tiny Mic Capsule -->
    <rect x="32" y="124" width="10" height="6" rx="2" fill="#111" />
    <rect x="32" y="124" width="4" height="6" fill="url(#brandYellow)" />
  </g>
</svg>
