name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: "postgresql://admin:adminpassword@localhost:5435/dauys_db?schema=public"

      - name: Prepare standalone files
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/
          mkdir -p .next/standalone/public
          cp public/*.png .next/standalone/public/
          cp -r prisma .next/standalone/prisma

      - name: Create archive
        run: |
          cd .next/standalone
          zip -r ../../standalone.zip .

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 77.246.247.80 >> ~/.ssh/known_hosts

      - name: Upload files to server
        run: |
          scp standalone.zip Dockerfile docker-compose.yml root@77.246.247.80:/root/dauys_original/

      - name: Extract archive and reload Docker containers
        run: |
          ssh root@77.246.247.80 "cd /root/dauys_original && rm -rf standalone_dist && unzip -o standalone.zip -d standalone_dist && rm standalone.zip && docker compose down && docker compose up -d --build"
